<svg xmlns="http://www.w3.org/2000/svg" viewBox="25 70 180 130" role="img" aria-label="Low energy low valence quadrant">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#151b26"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4e79a7" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#4e79a7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4e79a7" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="320" height="200" fill="url(#bg)" rx="8"/>
  <g opacity="0.22" stroke="#6a7f99" stroke-width="0.75" fill="none">
    <line x1="40" y1="20" x2="40" y2="170"/>
    <line x1="40" y1="170" x2="300" y2="170"/>
    <line x1="170" y1="20" x2="170" y2="170" stroke-dasharray="4 4" stroke="#e15759" opacity="0.7"/>
    <line x1="40" y1="95" x2="300" y2="95" stroke-dasharray="4 4" stroke="#e15759" opacity="0.7"/>
  </g>
  <rect x="40" y="95" width="130" height="75" fill="#4e79a7" opacity="0.06" rx="2"/>
  <text x="48" y="188" fill="#7a8fa8" font-family="Arial,sans-serif" font-size="9" letter-spacing="0.08em">ENERGY</text>
  <text x="12" y="100" fill="#7a8fa8" font-family="Arial,sans-serif" font-size="9" letter-spacing="0.08em" transform="rotate(-90 12 100)">VALENCE</text>
  <circle cx="72" cy="152" r="28" fill="url(#glow)" filter="url(#blur)"/>
  <circle cx="72" cy="152" r="9" fill="#4e79a7" stroke="#eef3fa" stroke-width="2"/>
  <circle cx="72" cy="152" r="14" fill="none" stroke="#9ec5e8" stroke-width="1.2" opacity="0.65"/>
  <text x="92" y="148" fill="#c8d6e8" font-family="Georgia,serif" font-size="11" font-style="italic">listen before i go</text>
  <text x="92" y="163" fill="#7a8fa8" font-family="Arial,sans-serif" font-size="8">E 0.06 / V 0.08</text>
</svg>
