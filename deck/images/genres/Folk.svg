<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="100%" stop-color="#0e0e0e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f28e2b" stop-opacity=".92"/>
      <stop offset="100%" stop-color="#f28e2b" stop-opacity=".35"/>
    </linearGradient>
    <radialGradient id="vinyl" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="55%" stop-color="#1a1a1a"/>
      <stop offset="56%" stop-color="#333"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.06"/></feComponentTransfer>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" filter="url(#noise)" opacity=".35"/>
  <rect x="0" y="0" width="800" height="8" fill="url(#accent)"/>
  <rect x="48" y="72" width="704" height="420" rx="12" fill="url(#accent)" opacity=".18"/>
  <rect x="48" y="72" width="704" height="420" rx="12" fill="none" stroke="#f28e2b" stroke-opacity=".35" stroke-width="2"/>
  <circle cx="400" cy="282" r="148" fill="url(#vinyl)"/>
  <circle cx="400" cy="282" r="52" fill="#f28e2b" opacity=".85"/>
  <circle cx="400" cy="282" r="14" fill="#0e0e0e"/>
  <text x="48" y="560" fill="#f1efea" font-family="Georgia,serif" font-size="24" letter-spacing="5" opacity=".45">GENRE</text>
  <text x="48" y="640" fill="#f1efea" font-family="Georgia,serif" font-size="68" font-weight="700">Folk</text>
  <text x="48" y="710" fill="#f1efea" font-family="Georgia,serif" font-size="28" opacity=".72" font-style="italic">The Night We Met</text>
  <text x="48" y="752" fill="#f1efea" font-family="monospace" font-size="22" opacity=".5">Lord Huron</text>
