  <circle cx="400" cy="282" r="14" fill="#0e0e0e"/>
  <text x="48" y="560" fill="#f1efea" font-family="Georgia,serif" font-size="24" letter-spacing="5" opacity=".45">GENRE</text>
  <text x="48" y="640" fill="#f1efea" font-family="Georgia,serif" font-size="68" font-weight="700">Easy Listening</text>
  <text x="48" y="710" fill="#f1efea" font-family="Georgia,serif" font-size="28" opacity=".72" font-style="italic">Brahms Lullaby</text>
